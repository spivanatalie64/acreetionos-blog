name: Renew SSL

on:
  schedule:
    - cron: '0 0 */10 * *'   # every 10 days
  workflow_dispatch:

jobs:
  cert:
    runs-on: ubuntu-latest
    steps:
      - name: Install certbot with Cloudflare plugin
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq certbot python3-certbot-dns-cloudflare

      - name: Create Cloudflare credentials file
        run: |
          mkdir -p ~/.secrets
          cat > ~/.secrets/cloudflare.ini <<EOF
          dns_cloudflare_api_token = ${{ secrets.CLOUDFLARE_API_TOKEN }}
          EOF
          chmod 600 ~/.secrets/cloudflare.ini

      - name: Obtain or renew certificate
        run: |
          sudo certbot certonly \
            --dns-cloudflare \
            --dns-cloudflare-credentials ~/.secrets/cloudflare.ini \
            -d blog.natalie.acreetionos.org \
            --email ACME_EMAIL \
            --agree-tos \
            --non-interactive \
            --preferred-challenges dns \
            --country US \
            --state $STATE \
            --city "$CITY" \
            --org "$ORG" \
            --keep-until-expiring

      - name: Show certificate info
        run: |
          CERT_DIR="/etc/letsencrypt/live/blog.natalie.acreetionos.org"
          if [ -d "$CERT_DIR" ]; then
            sudo openssl x509 -in "$CERT_DIR/fullchain.pem" -noout -text | grep -E "Subject:|Not Before|Not After"
            echo "✓ Certificate renewed"
          else
            echo "✗ Certificate directory not found"
            exit 1
          fi

      - name: Upload certificate as artifact
        uses: actions/upload-artifact@v4
        with:
          name: blog-natalie-acreetionos-cert
          path: /etc/letsencrypt/live/blog.natalie.acreetionos.org/
