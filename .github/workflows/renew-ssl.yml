name: Renew SSL

on:
  schedule:
    - cron: '0 0 1 * *'   # 1st of every month
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Re-trigger certificate provisioning
        run: |
          gh api repos/spivanatalie64/acreetionos-blog/pages -X PUT \
            -f cname='blog.natalie.acreetionos.org'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for HTTPS to be enforced
        run: |
          for i in $(seq 1 30); do
            status=$(gh api repos/spivanatalie64/acreetionos-blog/pages \
              --jq '.https_certificate.state // "pending"')
            echo "Attempt $i/30 — Certificate status: $status"
            if [ "$status" = "approved" ]; then
              echo "✓ SSL certificate issued"
              exit 0
            fi
            sleep 10
          done
          echo "✗ Certificate provisioning timed out"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify HTTPS
        run: |
          curl -sI --max-time 10 "https://blog.natalie.acreetionos.org" | head -5
          echo "✓ HTTPS is live"
