name: Generate Blog Post

on:
  schedule:
    - cron: '0 1,6,11,16,21 * * *'   # 5x daily: 01:00, 06:00, 11:00, 16:00, 21:00 UTC
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install opencode CLI
        run: |
          curl -fsSL https://opencode.ai/install | bash -s -- --no-modify-path
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"
          opencode --version

      - name: Generate blog post
        run: npx tsx src/scripts/generate-post.ts
        env:
          # Auth JSON for opencode-go provider — stored as a single encrypted secret
          OPENCODE_AUTH_JSON: ${{ secrets.OPENCODE_AUTH_JSON }}
          CONTENT_PROMPT: ${{ secrets.CONTENT_PROMPT }}
      - name: Commit and push
        run: |
          git config user.name "blog-bot"
          git config user.email "bot@acreetionos.org"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/spivanatalie64/acreetionos-blog.git
          git add src/content/posts/
          git diff --staged --quiet || git commit -m "Auto-generate blog post"
          git push
